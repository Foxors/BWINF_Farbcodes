<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>BWINF Farbcodes</title>
    <link rel="icon" type="image/png" href="https://bwinf.de/favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>BWINF Farbcodes</h1>
    </header>

    <div class="inputBar">
        <label for="code"><p>Code:</p></label>
        <p class="eingabe" id="code" contenteditable="plaintext-only"></p>
    </div>

    <div class="options">
        <!-- maybe <p> to an <input> ? i need to look at js for that... -->
        <button id="importieren">Code importieren</button>
        <button id="hinzufuegen">+ Wettbewerb hinzufügen</button>
        <button id="entfernen">- Wettbewerb entfernen</button>
        
        <label class="inputLabel" for="trennen"><p>Trennen?</p></label>
        <input id="trennen" type="checkbox"><label class="slider" for="trennen"></label>
    </div>

    <div id="wettbewerbe" class="competitions">
        <!-- Competitions for selection -->
    </div>

    <footer>
        <p class="footer-element"><a href="https://github.com/KR0K0BIL/BWINF_Farbcodes">Github</a> - <a href="https://bwinf.de/bundeswettbewerb/">Bundeswettbewerb Informatik</a></p>
    </footer>

    <script src="script.js"></script>
</body>
